<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library LINK - Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: linear-gradient(90deg,#9A5435 0%,#7A3F25 60%,#6B6464 100%);
      box-shadow: 0 2px 16px rgba(92,48,32,0.3);
      z-index: 10;
      flex-shrink: 0;
    }

    header img {
      height: 36px;
      object-fit: contain;
      filter: invert(1) brightness(3) opacity(0.8);
      mix-blend-mode: screen;
    }

    nav {
      display: flex;
      gap: 4px;
    }

    nav button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,246,239,0.6);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: "Poppins", sans-serif;
    }

    nav button.active {
      color: #FFF6EF;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    .header-buttons button {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.3s;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,246,239,0.85);
      background: rgba(255,255,255,0.12);
    }

    .header-buttons .register {
      color: #FFF6EF;
      background: linear-gradient(135deg,#C4784F,#9A5435);
      box-shadow: 0 2px 8px rgba(154,84,53,0.3);
      border: none;
    }

    .mobile-tabs {
      display: none;
      overflow-x: auto;
      background: rgba(250,233,221,0.97);
      border-bottom: 1px solid rgba(220,187,169,0.4);
      flex-shrink: 0;
    }

    .mobile-tabs button {
      padding: 10px 16px;
      flex-shrink: 0;
      background: transparent;
      border: none;
      font-size: 12px;
      color: #BCB1AB;
      cursor: pointer;
      font-family: "Poppins", sans-serif;
      position: relative;
    }

    .mobile-tabs button.active {
      color: #9A5435;
    }

    .mobile-tabs button.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,#9A5435,#C4784F);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      background: linear-gradient(160deg,#FFF6EF 0%,#FAE9DD 60%,#EECBAD 100%);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
    }

    /* WELCOME TAB */
    .hero {
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 32px;
      background: linear-gradient(135deg,#9A5435 0%,#C4784F 45%,#D6A17B 80%,#EBC09B 100%);
      min-height: 340px;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.1;
      background-image: radial-gradient(circle at 50% 60%,#FFF6EF 0%,transparent 65%);
    }

    .hero h1 {
      font-family: "Hammersmith One", sans-serif;
      font-size: clamp(28px, 5vw, 52px);
      color: #FFF6EF;
      line-height: 1.15;
      position: relative;
      max-width: 700px;
    }

    .hero p {
      font-size: 16px;
      color: rgba(255,246,239,0.78);
      margin-top: 14px;
      max-width: 520px;
      position: relative;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
      justify-content: center;
      position: relative;
    }

    .hero-buttons button {
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.3s;
      border: none;
    }

    .hero-buttons .browse {
      background: #FFF6EF;
      color: #9A5435;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .hero-buttons .create {
      background: rgba(255,255,255,0.15);
      color: #FFF6EF;
      border: 1px solid rgba(255,255,255,0.35);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      padding: 32px 24px;
    }

    .stat-card {
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      background: linear-gradient(160deg,rgba(255,246,239,0.92),rgba(250,236,226,0.88));
      border: 1px solid rgba(220,187,169,0.5);
      box-shadow: 0 4px 20px rgba(154,84,53,0.08);
    }

    .stat-card .value {
      font-family: "Hammersmith One", sans-serif;
      font-size: 26px;
      background: linear-gradient(135deg,#9A5435,#C4784F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card .label {
      font-size: 12px;
      color: #9A8578;
      margin-top: 12px;
    }

    .featured-section {
      padding: 0 24px 32px;
    }

    .featured-section h2 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 22px;
      color: #5C3020;
      margin-bottom: 16px;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    .book-card {
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(160deg,rgba(255,246,239,0.92),rgba(250,236,226,0.88));
      border: 1px solid rgba(220,187,169,0.5);
      box-shadow: 0 4px 20px rgba(154,84,53,0.08);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .book-card:hover {
      transform: scale(1.02);
    }

    .book-card .image {
      position: relative;
      overflow: hidden;
      height: 100px;
      background: #DCBBA9;
    }

    .book-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .book-card:hover img {
      transform: scale(1.05);
    }

    .book-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(92,48,32,0.6) 0%, transparent 55%);
    }

    .book-card .info {
      padding: 12px;
    }

    .book-card .title {
      font-size: 11px;
      color: #5C3020;
      font-weight: 600;
      line-height: 1.3;
    }

    .book-card .author {
      font-size: 10px;
      color: #BCB1AB;
      margin-top: 8px;
    }

    /* ABOUT TAB */
    .max-w-3xl {
      max-width: 768px;
      margin: 0 auto;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .about-header {
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg,#9A5435,#C4784F);
    }

    .about-header::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.1;
      background-image: radial-gradient(circle at 80% 20%,#FFF6EF 0%,transparent 60%);
    }

    .about-header h1 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 28px;
      color: #FFF6EF;
      position: relative;
    }

    .about-header p {
      font-size: 14px;
      color: rgba(255,246,239,0.78);
      margin-top: 8px;
      line-height: 1.75;
      position: relative;
    }

    .feature-card {
      border-radius: 16px;
      padding: 20px;
      background: linear-gradient(160deg,rgba(255,246,239,0.92),rgba(250,236,226,0.88));
      border: 1px solid rgba(220,187,169,0.5);
      box-shadow: 0 4px 20px rgba(154,84,53,0.08);
    }

    .feature-card .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .feature-card .icon {
      font-size: 24px;
    }

    .feature-card h3 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 18px;
      color: #5C3020;
    }

    .feature-card p {
      font-size: 13px;
      color: #6B6464;
      line-height: 1.75;
    }

    /* RULES TAB */
    .rules-content {
      max-width: 768px;
      margin: 0 auto;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .rules-content h1 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 26px;
      color: #5C3020;
    }

    .policy-section {
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(160deg,rgba(255,246,239,0.92),rgba(250,236,226,0.88));
      border: 1px solid rgba(220,187,169,0.5);
      box-shadow: 0 4px 20px rgba(154,84,53,0.08);
    }

    .policy-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: linear-gradient(90deg,rgba(220,187,169,0.4),rgba(250,236,226,0.2));
      border-bottom: 1px solid rgba(220,187,169,0.35);
    }

    .policy-header .icon {
      font-size: 20px;
    }

    .policy-header h3 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 17px;
      color: #5C3020;
    }

    .policy-items {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .policy-items li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: #6B6464;
      line-height: 1.6;
      list-style: none;
    }

    .policy-items li::before {
      content: '';
      flex-shrink: 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg,#9A5435,#C4784F);
      margin-top: 8px;
    }

    /* CATALOG TAB */
    .catalog-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .catalog-header {
      padding: 16px 24px;
      flex-shrink: 0;
      background: rgba(250,233,221,0.97);
      border-bottom: 1px solid rgba(220,187,169,0.4);
    }

    .catalog-header p {
      font-family: "Hammersmith One", sans-serif;
      font-size: 18px;
      color: #5C3020;
      margin-bottom: 10px;
    }

    .search-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .search-input {
      position: relative;
      flex: 1;
      max-width: 320px;
    }

    .search-input svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .search-input input {
      width: 100%;
      padding: 10px 36px 10px 36px;
      border-radius: 12px;
      outline: none;
      background: rgba(255,246,239,0.85);
      border: 1px solid rgba(220,187,169,0.6);
      font-size: 13px;
      color: #5C3020;
      font-family: "Poppins", sans-serif;
    }

    .category-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .category-filter button {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      background: rgba(255,246,239,0.8);
      color: #877368;
      border: 1px solid rgba(220,187,169,0.5);
      font-family: "Poppins", sans-serif;
    }

    .category-filter button.active {
      background: linear-gradient(135deg,#9A5435,#C4784F);
      color: #FFF6EF;
      border: none;
    }

    .result-count {
      font-size: 11px;
      color: #BCB1AB;
      margin-top: 8px;
    }

    .catalog-books {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .catalog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .catalog-book-card {
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(160deg,rgba(255,246,239,0.92),rgba(250,236,226,0.88));
      border: 1px solid rgba(220,187,169,0.5);
      box-shadow: 0 4px 20px rgba(154,84,53,0.08);
      cursor: pointer;
      transition: transform 0.3s;
    }

    .catalog-book-card:hover {
      transform: scale(1.02);
    }

    .catalog-book-card .image {
      position: relative;
      overflow: hidden;
      height: 120px;
      background: #DCBBA9;
    }

    .catalog-book-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .catalog-book-card:hover img {
      transform: scale(1.05);
    }

    .catalog-book-card .category-tag {
      position: absolute;
      bottom: 8px;
      left: 12px;
      font-size: 10px;
      color: rgba(255,246,239,0.8);
    }

    .catalog-book-card .info {
      padding: 16px;
    }

    .catalog-book-card .title {
      font-size: 13px;
      color: #5C3020;
      font-weight: 600;
      line-height: 1.3;
    }

    .catalog-book-card .author {
      font-size: 11px;
      color: #9A8578;
      margin-top: 8px;
    }

    .catalog-book-card .category {
      font-size: 10px;
      color: #BCB1AB;
      margin-top: 4px;
    }

    .catalog-book-card .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .availability {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
    }

    .availability.available {
      background: rgba(154,84,53,0.1);
      color: #9A5435;
    }

    .availability.unavailable {
      background: rgba(135,115,104,0.1);
      color: #877368;
    }

    .reserve-btn {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 10px;
      background: linear-gradient(135deg,#9A5435,#C4784F);
      color: #FFF6EF;
      border: none;
      cursor: pointer;
    }

    /* CONTACT TAB */
    .contact-content {
      max-width: 768px;
      margin: 0 auto;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .contact-content h1 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 26px;
      color: #5C3020;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .contact-card {
      border-radius: 16px;
      padding: 20px;
      background: linear-gradient(160deg,rgba(255,246,239,0.92),rgba(250,236,226,0.88));
      border: 1px solid rgba(220,187,169,0.5);
      box-shadow: 0 4px 20px rgba(154,84,53,0.08);
    }

    .contact-card .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .contact-card .icon {
      font-size: 22px;
    }

    .contact-card h3 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 16px;
      color: #5C3020;
    }

    .contact-card p {
      font-size: 13px;
      color: #6B6464;
      line-height: 1.75;
      white-space: pre-line;
    }

    .contact-form {
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(160deg,rgba(255,246,239,0.92),rgba(250,236,226,0.88));
      border: 1px solid rgba(220,187,169,0.5);
      box-shadow: 0 4px 20px rgba(154,84,53,0.08);
    }

    .form-header {
      padding: 16px 20px;
      background: linear-gradient(90deg,rgba(220,187,169,0.4),rgba(250,236,226,0.2));
      border-bottom: 1px solid rgba(220,187,169,0.35);
    }

    .form-header h3 {
      font-family: "Hammersmith One", sans-serif;
      font-size: 17px;
      color: #5C3020;
    }

    .form-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-content input,
    .form-content textarea {
      padding: 10px 16px;
      border-radius: 12px;
      outline: none;
      background: rgba(255,246,239,0.85);
      border: 1px solid rgba(220,187,169,0.55);
      font-size: 13px;
      color: #5C3020;
      font-family: "Poppins", sans-serif;
    }

    .form-content textarea {
      resize: none;
      min-height: 100px;
    }

    .form-content button {
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(135deg,#9A5435,#C4784F);
      color: #FFF6EF;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(154,84,53,0.25);
      transition: opacity 0.3s;
    }

    .form-content button:hover {
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      nav {
        display: none;
      }

      .mobile-tabs {
        display: flex;
      }

      .catalog-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <img src="https://via.placeholder.com/40" alt="Library Link">
      <nav id="desktopNav"></nav>
      <div class="header-buttons">
        <button onclick="handleLogin()">Sign In</button>
        <button class="register" onclick="handleSignUp()">Register</button>
      </div>
    </header>

    <!-- Mobile Tabs -->
    <div class="mobile-tabs" id="mobileTabs"></div>

    <!-- Content -->
    <div class="content" id="content"></div>
  </div>

  <script>
    const TABS = [
      { id: "welcome", label: "Home" },
      { id: "about", label: "About" },
      { id: "rules", label: "Rules & Policies" },
      { id: "catalog", label: "Search Catalog" },
      { id: "contact", label: "Contact" },
    ];

    const featuredBooks = [
      { title: "Introduction to Algorithms", author: "Cormen et al.", cat: "Computer Science", available: 2, img: "https://images.unsplash.com/photo-1628258334105-2a0b3d6efee1?w=300&h=200&fit=crop&auto=format" },
      { title: "University Physics", author: "Hugh D. Young", cat: "Physics", available: 4, img: "https://images.unsplash.com/photo-1604866830893-c13cafa515d5?w=300&h=200&fit=crop&auto=format" },
      { title: "Sapiens", author: "Yuval N. Harari", cat: "History", available: 3, img: "https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=300&h=200&fit=crop&auto=format" },
      { title: "Pride and Prejudice", author: "Jane Austen", cat: "Literature", available: 6, img: "https://images.unsplash.com/photo-1760120482171-d9d5468f75fd?w=300&h=200&fit=crop&auto=format" },
      { title: "Linear Algebra", author: "Gilbert Strang", cat: "Mathematics", available: 3, img: "https://images.unsplash.com/photo-1509228468518-180dd4864904?w=300&h=200&fit=crop&auto=format" },
      { title: "Artificial Intelligence", author: "Stuart Russell", cat: "Computer Science", available: 3, img: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=300&h=200&fit=crop&auto=format" },
    ];

    const allBooks = [
      ...featuredBooks,
      { title: "Database Systems", author: "Ramez Elmasri", cat: "Computer Science", available: 0, img: "https://images.unsplash.com/photo-1599837487527-e009248aa71b?w=300&h=200&fit=crop&auto=format" },
      { title: "Operating Systems", author: "A. Tanenbaum", cat: "Computer Science", available: 3, img: "https://images.unsplash.com/photo-1580121441575-41bcb5c6b47c?w=300&h=200&fit=crop&auto=format" },
      { title: "Calculus: Early Trans.", author: "James Stewart", cat: "Mathematics", available: 4, img: "https://images.unsplash.com/photo-1676302447092-14a103558511?w=300&h=200&fit=crop&auto=format" },
      { title: "A Brief History of Time", author: "S. Hawking", cat: "History", available: 2, img: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?w=300&h=200&fit=crop&auto=format" },
    ];

    const categories = ["All", "Computer Science", "Mathematics", "Physics", "Literature", "History"];

    let currentTab = "welcome";
    let searchQuery = "";
    let selectedCategory = "All";

    function handleLogin() {
      alert("Login functionality to be implemented");
    }

    function handleSignUp() {
      alert("Sign up functionality to be implemented");
    }

    function setTab(tabId) {
      currentTab = tabId;
      render();
    }

    function setSearchQuery(q) {
      searchQuery = q;
      renderCatalog();
    }

    function setCategory(cat) {
      selectedCategory = cat;
      renderCatalog();
    }

    function getFilteredBooks() {
      return allBooks.filter(b =>
        (selectedCategory === "All" || b.cat === selectedCategory) &&
        (b.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
         b.author.toLowerCase().includes(searchQuery.toLowerCase()))
      );
    }

    function renderNav() {
      const nav = document.getElementById("desktopNav");
      nav.innerHTML = TABS.map(t => 
        `<button class="${currentTab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">${t.label}</button>`
      ).join("");
    }

    function renderMobileTabs() {
      const mobile = document.getElementById("mobileTabs");
      mobile.innerHTML = TABS.map(t =>

          <div class="catalog-books">

    function render() {
      renderNav();

      switch(currentTab) {

          html = renderRules();
          break;
