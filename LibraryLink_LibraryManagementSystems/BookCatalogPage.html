<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(160deg, #FFF6EF 0%, #FAE9DD 60%, #EECBAD 100%);
    }

    /* ─── Toolbar ─────────────────────── */
    .toolbar {
      padding: 16px 20px;
      flex-shrink: 0;
      background: linear-gradient(90deg, rgba(250,233,221,0.97), rgba(220,187,169,0.6));
      border-bottom: 1px solid rgba(154,84,53,0.12);
    }
    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
    }
    .search-wrap input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border-radius: 12px;
      outline: none;
      background: rgba(255,246,239,0.85);
      border: 1px solid rgba(220,187,169,0.6);
      font-size: 13px;
      color: #5C3020;
      font-family: 'Poppins', sans-serif;
    }
    .search-wrap input::placeholder { color: #BCB1AB; }

    select.sort-select {
      padding: 8px 12px;
      border-radius: 12px;
      outline: none;
      background: rgba(255,246,239,0.85);
      border: 1px solid rgba(220,187,169,0.6);
      font-size: 12px;
      color: #5C3020;
      font-family: 'Poppins', sans-serif;
    }

    .cat-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .cat-btn {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Poppins', sans-serif;
      background: rgba(255,246,239,0.85);
      color: #877368;
      border: 1px solid rgba(220,187,169,0.5);
    }
    .cat-btn.active {
      background: linear-gradient(135deg, #9A5435, #C4784F);
      color: #FFF6EF;
      border: none;
      box-shadow: 0 2px 8px rgba(154,84,53,0.2);
    }
    .cat-count {
      font-size: 11px;
      color: #BCB1AB;
      margin-left: auto;
    }

    /* ─── Grid ───────────────────────── */
    .grid-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (min-width: 640px)  { .book-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1024px) { .book-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1280px) { .book-grid { grid-template-columns: repeat(5, 1fr); } }

    .book-card {
      background: linear-gradient(160deg, rgba(255,246,239,0.95), rgba(250,233,221,0.9));
      border: 1px solid rgba(220,187,169,0.4);
      box-shadow: 0 4px 20px rgba(154,84,53,0.07);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .book-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(154,84,53,0.18);
    }
    .card-cover {
      position: relative;
      height: 160px;
      background: #DCBBA9;
      overflow: hidden;
    }
    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .book-card:hover .card-cover img { transform: scale(1.05); }
    .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(92,48,32,0.7) 0%, transparent 50%);
    }
    .avail-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 600;
      color: #FFF6EF;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .avail-badge.ok { background: rgba(154,84,53,0.85); }
    .avail-badge.no { background: rgba(107,100,100,0.85); }
    .card-cat {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 9px;
      color: rgba(255,246,239,0.75);
    }
    .card-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .card-title {
      font-size: 12px;
      color: #5C3020;
      font-weight: 600;
      line-height: 1.3;
    }
    .card-author {
      font-size: 10px;
      color: #9A8578;
    }
    .card-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .star { font-size: 12px; }
    .star.on  { color: #C4784F; }
    .star.off { color: #DCBBA9; }
    .rating-val { font-size: 10px; color: #BCB1AB; }

    .reserve-btn {
      width: 100%;
      margin-top: auto;
      padding: 8px 0 6px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: opacity 0.2s;
    }
    .reserve-btn:hover { opacity: 0.85; }
    .reserve-btn.can-reserve {
      background: linear-gradient(135deg, #9A5435, #C4784F);
      color: #FFF6EF;
      box-shadow: 0 2px 8px rgba(154,84,53,0.2);
    }
    .reserve-btn.reserved-state {
      background: rgba(135,115,104,0.15);
      color: #877368;
      box-shadow: none;
    }
    .reserve-btn.cant-reserve {
      background: rgba(220,187,169,0.3);
      color: #BCB1AB;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ─── Modal ──────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(60,30,15,0.55);
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-panel {
      width: 100%;
      max-width: 448px;
      border-radius: 16px;
      overflow: hidden;
      background: #FFF6EF;
      box-shadow: 0 24px 64px rgba(92,48,32,0.35);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-cover {
      position: relative;
      height: 192px;
      overflow: hidden;
      background: #DCBBA9;
    }
    .modal-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(92,48,32,0.85) 0%, rgba(92,48,32,0.2) 60%, transparent 100%);
    }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      color: #FFF6EF;
      font-size: 14px;
      backdrop-filter: blur(4px);
      border: none;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
    }
    .modal-cover-info {
      position: absolute;
      bottom: 12px;
      left: 16px;
    }
    .modal-cover-title {
      font-family: 'Hammersmith One', sans-serif;
      font-size: 18px;
      color: #FFF6EF;
      line-height: 1.2;
    }
    .modal-cover-sub {
      font-size: 12px;
      color: rgba(255,246,239,0.75);
      margin-top: 2px;
    }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
      max-height: 55vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-rating-row .rating-val {
      font-size: 12px;
      color: #BCB1AB;
    }
    .modal-tags {
      display: flex;
      gap: 8px;
    }
    .modal-tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
    }
    .modal-tag.cat-tag { background: rgba(154,84,53,0.1); color: #9A5435; }
    .modal-tag.isbn-tag { background: rgba(135,115,104,0.1); color: #877368; }
    .modal-desc {
      font-size: 13px;
      color: #6B6464;
      line-height: 1.7;
    }
    .modal-stats {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid rgba(220,187,169,0.35);
      border-bottom: 1px solid rgba(220,187,169,0.35);
      font-size: 12px;
      color: #9A8578;
    }
    .modal-stats strong { color: #5C3020; }
    .modal-stats strong.avail { color: #9A5435; }
    .modal-stats strong.unavail { color: #BCB1AB; }
    .reviews-header {
      font-size: 11px;
      color: #9A8578;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .review-card {
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(250,236,226,0.6);
      border: 1px solid rgba(220,187,169,0.3);
    }
    .review-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .review-user {
      font-size: 12px;
      color: #5C3020;
      font-weight: 600;
    }
    .review-text {
      font-size: 12px;
      color: #6B6464;
    }
    .modal-reserve-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: opacity 0.2s;
    }
    .modal-reserve-btn:hover { opacity: 0.85; }
    .modal-reserve-btn.can-reserve {
      background: linear-gradient(135deg, #9A5435, #C4784F);
      color: #FFF6EF;
      box-shadow: 0 4px 14px rgba(154,84,53,0.25);
    }
    .modal-reserve-btn.reserved-state {
      background: linear-gradient(135deg, #9A5435, #C4784F);
      color: #FFF6EF;
      box-shadow: 0 4px 14px rgba(154,84,53,0.25);
    }
    .modal-reserve-btn.cant-reserve {
      background: rgba(220,187,169,0.35);
      color: #BCB1AB;
      cursor: not-allowed;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-row">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="#BCB1AB" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search title or author…">
        </div>
        <select id="sortSelect" class="sort-select">
          <option value="title">Sort: A–Z</option>
          <option value="rating">Sort: Rating</option>
          <option value="available">Sort: Available</option>
        </select>
      </div>
      <div class="cat-row" id="catRow"></div>
    </div>

    <!-- Book Grid -->
    <div class="grid-scroll">
      <div class="book-grid" id="bookGrid"></div>
    </div>

    <!-- Detail Modal (hidden by default) -->
    <div class="modal-backdrop" id="modalBackdrop" style="display:none;">
      <div class="modal-panel" id="modalPanel"></div>
    </div>
  </div>

  <script>
    // ─── Data ──────────────────────────
    var BOOK_IMGS = {
      1: "https://images.unsplash.com/photo-1628258334105-2a0b3d6efee1?w=400&h=280&fit=crop&auto=format",
      2: "https://images.unsplash.com/photo-1599837487527-e009248aa71b?w=400&h=280&fit=crop&auto=format",
      3: "https://images.unsplash.com/photo-1580121441575-41bcb5c6b47c?w=400&h=280&fit=crop&auto=format",
      4: "https://images.unsplash.com/photo-1509228468518-180dd4864904?w=400&h=280&fit=crop&auto=format",
      5: "https://images.unsplash.com/photo-1676302447092-14a103558511?w=400&h=280&fit=crop&auto=format",
      6: "https://images.unsplash.com/photo-1604866830893-c13cafa515d5?w=400&h=280&fit=crop&auto=format",
      7: "https://images.unsplash.com/photo-1554290410-4be2dfbe66f8?w=400&h=280&fit=crop&auto=format",
      8: "https://images.unsplash.com/photo-1632571401005-458e9d244591?w=400&h=280&fit=crop&auto=format",
      9: "https://images.unsplash.com/photo-1760120482171-d9d5468f75fd?w=400&h=280&fit=crop&auto=format",
      10: "https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=400&h=280&fit=crop&auto=format",
      11: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400&h=280&fit=crop&auto=format",
      12: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?w=400&h=280&fit=crop&auto=format"
    };

    var books = [
      { id: 1,  title: "Introduction to Algorithms",      author: "Cormen et al.",     cat: "Computer Science", copies: 3, available: 2, rating: 4.8, reviews: 24, isbn: "978-0-262-03384-8", year: 2022, desc: "A comprehensive introduction to modern algorithms, covering design, analysis, and implementation." },
      { id: 2,  title: "Database Systems",                author: "Ramez Elmasri",     cat: "Computer Science", copies: 5, available: 0, rating: 4.5, reviews: 18, isbn: "978-0-13-468606-8", year: 2021, desc: "Covers the fundamental concepts and applications of database systems." },
      { id: 3,  title: "Operating Systems",               author: "Andrew Tanenbaum",  cat: "Computer Science", copies: 4, available: 3, rating: 4.6, reviews: 31, isbn: "978-0-13-359162-0", year: 2023, desc: "In-depth coverage of modern operating systems concepts and implementations." },
      { id: 4,  title: "Calculus: Early Transcendentals", author: "James Stewart",     cat: "Mathematics",      copies: 6, available: 4, rating: 4.4, reviews: 42, isbn: "978-1-285-74155-0", year: 2020, desc: "Standard calculus textbook used in universities worldwide." },
      { id: 5,  title: "Data Structures & Algorithms",    author: "Michael Goodrich",  cat: "Mathematics",      copies: 3, available: 1, rating: 4.7, reviews: 15, isbn: "978-1-118-77138-9", year: 2021, desc: "Essential data structures and algorithms for every programmer." },
      { id: 6,  title: "University Physics",              author: "Hugh D. Young",     cat: "Physics",          copies: 4, available: 4, rating: 4.3, reviews: 28, isbn: "978-0-13-606132-8", year: 2022, desc: "Authoritative physics textbook for science and engineering students." },
      { id: 7,  title: "Computer Networks",               author: "Andrew Tanenbaum",  cat: "Computer Science", copies: 2, available: 0, rating: 4.5, reviews: 22, isbn: "978-0-13-212695-3", year: 2021, desc: "Comprehensive treatment of computer networking from first principles." },
      { id: 8,  title: "Linear Algebra",                  author: "Gilbert Strang",    cat: "Mathematics",      copies: 5, available: 3, rating: 4.9, reviews: 38, isbn: "978-0-98-023760-0", year: 2023, desc: "Renowned text covering linear algebra with applications." },
      { id: 9,  title: "Pride and Prejudice",             author: "Jane Austen",       cat: "Literature",       copies: 7, available: 6, rating: 4.7, reviews: 56, isbn: "978-0-14-143951-8", year: 2002, desc: "Jane Austen's beloved classic about love, society, and marriage." },
      { id: 10, title: "Sapiens",                         author: "Yuval N. Harari",   cat: "History",          copies: 4, available: 2, rating: 4.6, reviews: 67, isbn: "978-0-06-231609-7", year: 2015, desc: "A brief history of humankind from ancient times to present." },
      { id: 11, title: "Artificial Intelligence",         author: "Stuart Russell",    cat: "Computer Science", copies: 3, available: 3, rating: 4.8, reviews: 19, isbn: "978-0-13-604259-4", year: 2020, desc: "The definitive AI textbook used in universities globally." },
      { id: 12, title: "A Brief History of Time",         author: "Stephen Hawking",   cat: "History",          copies: 3, available: 2, rating: 4.7, reviews: 73, isbn: "978-0-55-317535-8", year: 1998, desc: "Stephen Hawking explores the cosmos in this landmark popular science book." }
    ];

    var userReviews = {
      1: [
        { user: "Aisha M.", rating: 5, text: "Best algorithms book ever written. Essential for CS students." },
        { user: "Rayan A.", rating: 5, text: "Dense but incredibly rewarding. Changed how I think about problems." }
      ],
      8: [{ user: "Fatima N.", rating: 5, text: "Gilbert Strang explains linear algebra better than anyone." }]
    };

    var cats = ["All", "Computer Science", "Mathematics", "Physics", "Literature", "History"];

    // ─── State ─────────────────────────
    var query = "";
    var activeCat = "All";
    var sortBy = "title";
    var detailBook = null;
    var reserved = [];

    // ─── Helpers ───────────────────────
    function starHTML(rating) {
      var h = '';
      for (var i = 0; i < 5; i++) {
        h += '<span class="star ' + (i < Math.round(rating) ? 'on' : 'off') + '">★</span>';
      }
      return h;
    }

    function getFilteredBooks() {
      return books.filter(function(b) {
        return (activeCat === "All" || b.cat === activeCat) &&
          (b.title.toLowerCase().indexOf(query.toLowerCase()) !== -1 ||
           b.author.toLowerCase().indexOf(query.toLowerCase()) !== -1);
      }).sort(function(a, b) {
        if (sortBy === "rating")    return b.rating - a.rating;
        if (sortBy === "available") return b.available - a.available;
        return a.title.localeCompare(b.title);
      });
    }

    // ─── Render ────────────────────────
    function renderCategories() {
      var row = document.getElementById('catRow');
      row.innerHTML = cats.map(function(c) {
        return '<button class="cat-btn' + (c === activeCat ? ' active' : '') + '" data-cat="' + c + '">' + c + '</button>';
      }).join('');

      var filtered = getFilteredBooks();
      row.innerHTML += '<span class="cat-count">' + filtered.length + ' books</span>';

      row.querySelectorAll('.cat-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          activeCat = btn.getAttribute('data-cat');
          renderAll();
        });
      });
    }

    function renderGrid() {
      var grid = document.getElementById('bookGrid');
      var filtered = getFilteredBooks();
      grid.innerHTML = filtered.map(function(book) {
        var isRes = reserved.indexOf(book.id) !== -1;
        var canReserve = book.available > 0;
        var btnClass = isRes ? 'reserved-state' : (canReserve ? 'can-reserve' : 'cant-reserve');
        var btnText = isRes ? '✓ Reserved' : (canReserve ? 'Reserve' : 'Unavailable');
        return [
          '<div class="book-card" data-id="' + book.id + '">',
            '<div class="card-cover">',
              '<img src="' + BOOK_IMGS[book.id] + '" alt="' + book.title + '">',
              '<div class="cover-overlay"></div>',
              '<span class="avail-badge ' + (canReserve ? 'ok' : 'no') + '">',
                canReserve ? (book.available + '/' + book.copies + ' available') : 'Unavailable',
              '</span>',
              '<span class="card-cat">' + book.cat + '</span>',
            '</div>',
            '<div class="card-info">',
              '<p class="card-title">' + book.title + '</p>',
              '<p class="card-author">' + book.author + ' · ' + book.year + '</p>',
              '<div class="card-rating">' + starHTML(book.rating) + '<span class="rating-val">' + book.rating + '</span></div>',
              '<button class="reserve-btn ' + btnClass + '" data-reserve-id="' + book.id + '">' + btnText + '</button>',
            '</div>',
          '</div>'
        ].join('');
      });

      // Card click → open modal
      grid.querySelectorAll('.book-card').forEach(function(card) {
        card.addEventListener('click', function(e) {
          var id = parseInt(card.getAttribute('data-id'));
          var book = books.find(function(b) { return b.id === id; });
          if (book) openModal(book);
        });
      });

      // Reserve button click
      grid.querySelectorAll('.reserve-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var id = parseInt(btn.getAttribute('data-reserve-id'));
          toggleReserve(id);
          renderAll();
        });
      });
    }

    function openModal(book) {
      detailBook = book;
      var backdrop = document.getElementById('modalBackdrop');
      var panel = document.getElementById('modalPanel');
      var isRes = reserved.indexOf(book.id) !== -1;
      var canReserve = book.available > 0;
      var reviews = userReviews[book.id] || [];
      var btnClass = canReserve ? 'can-reserve' : 'cant-reserve';
      var btnText = isRes ? '✓ Reserved' : (canReserve ? 'Reserve This Book' : 'Currently Unavailable');

      var reviewsHTML = '';
      if (reviews.length > 0) {
        reviewsHTML = '<div><p class="reviews-header">STUDENT REVIEWS</p>' +
          reviews.map(function(r) {
            return '<div class="review-card">' +
              '<div class="review-top"><span class="review-user">' + r.user + '</span>' + starHTML(r.rating) + '</div>' +
              '<p class="review-text">' + r.text + '</p>' +
            '</div>';
          }).join('') + '</div>';
      }

      panel.innerHTML = [
        '<div class="modal-cover">',
          '<img src="' + BOOK_IMGS[book.id] + '" alt="' + book.title + '">',
          '<div class="modal-cover-overlay"></div>',
          '<button class="modal-close">✕</button>',
          '<div class="modal-cover-info">',
            '<p class="modal-cover-title">' + book.title + '</p>',
            '<p class="modal-cover-sub">' + book.author + ' · ' + book.year + '</p>',
          '</div>',
        '</div>',
        '<div class="modal-body">',
          '<div class="modal-rating-row">' + starHTML(book.rating) + '<span class="rating-val">' + book.rating + ' · ' + book.reviews + ' reviews</span></div>',
          '<div class="modal-tags">',
            '<span class="modal-tag cat-tag">' + book.cat + '</span>',
            '<span class="modal-tag isbn-tag">ISBN: ' + book.isbn + '</span>',
          '</div>',
          '<p class="modal-desc">' + book.desc + '</p>',
          '<div class="modal-stats">',
            '<span>Total copies: <strong>' + book.copies + '</strong></span>',
            '<span>Available: <strong class="' + (book.available > 0 ? 'avail' : 'unavail') + '">' + book.available + '</strong></span>',
          '</div>',
          reviewsHTML,
          '<button class="modal-reserve-btn ' + btnClass + '" id="modalReserveBtn">' + btnText + '</button>',
        '</div>'
      ].join('');

      backdrop.style.display = 'flex';
      document.body.style.overflow = 'hidden';

      // Close button
      panel.querySelector('.modal-close').addEventListener('click', closeModal);
      // Backdrop click
      backdrop.addEventListener('click', function(e) {
        if (e.target === backdrop) closeModal();
      });
      // Reserve button
      var reserveBtn = panel.querySelector('#modalReserveBtn');
      if (canReserve) {
        reserveBtn.addEventListener('click', function() {
          toggleReserve(book.id);
          closeModal();
          renderAll();
        });
      }
    }

    function closeModal() {
      document.getElementById('modalBackdrop').style.display = 'none';
      document.body.style.overflow = '';
      detailBook = null;
    }

    function toggleReserve(id) {
      var idx = reserved.indexOf(id);
      if (idx !== -1) {
        reserved.splice(idx, 1);
      } else {
        reserved.push(id);
      }
    }

    function renderAll() {
      renderCategories();
      renderGrid();
    }

    // ─── Event Listeners ──────────────
    document.getElementById('searchInput').addEventListener('input', function() {
      query = this.value;
      renderAll();
    });

    document.getElementById('sortSelect').addEventListener('change', function() {
      sortBy = this.value;
      renderAll();
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ─── Initial Render ────────────────
    renderAll();
  </script>
</body>
</html>
