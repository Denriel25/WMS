<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hammersmith+One&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(160deg, #FFF6EF 0%, #FAE9DD 60%, #EECBAD 100%);
      color: #5C3020;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .banner {
      position: relative;
      overflow: hidden;
      padding: 32px;
      background: linear-gradient(135deg, #9A5435 0%, #C4784F 50%, #D6A17B 100%);
      box-shadow: 0 4px 24px rgba(154,84,53,0.25);
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.15;
      background-image: radial-gradient(circle at 70% 30%, #FFF6EF 0%, transparent 55%);
      pointer-events: none;
    }

    .banner h2 {
      position: relative;
      margin: 0;
      font-family: "Hammersmith One", sans-serif;
      font-size: 25px;
      color: #FFF6EF;
    }

    .banner p {
      position: relative;
      margin: 4px 0 0;
      font-size: 13px;
      color: rgba(255,246,239,0.7);
    }

    .content {
      padding: 24px;
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (min-width: 1024px) {
      .layout {
        flex-direction: row;
        align-items: flex-start;
      }
    }

    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 8px;
      min-width: 220px;
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #9A5435, #C4784F);
      box-shadow: 0 8px 28px rgba(154,84,53,0.3);
      border: 3px solid rgba(255,246,239,0.6);
    }

    .avatar span {
      font-family: "Hammersmith One", sans-serif;
      font-size: 36px;
      color: #FFF6EF;
    }

    .btn {
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .change-photo {
      padding: 10px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(220,187,169,0.5), rgba(188,177,171,0.4));
      color: #6B6464;
      font-size: 13px;
      border: 1px solid rgba(220,187,169,0.55);
    }

    .role-card {
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      background: linear-gradient(135deg, rgba(154,84,53,0.06), rgba(235,192,155,0.1));
      border: 1px solid rgba(154,84,53,0.12);
      max-width: 120px;
    }

    .role-card .label {
      font-size: 11px;
      color: #9A8578;
      margin: 0;
    }

    .role-card .value {
      font-size: 12px;
      color: #5C3020;
      font-weight: 600;
      margin: 2px 0 0;
    }

    .form-card {
      flex: 1;
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: linear-gradient(160deg, rgba(255,246,239,0.9) 0%, rgba(248,234,223,0.85) 100%);
      border: 1px solid rgba(220,187,169,0.45);
      box-shadow: 0 4px 24px rgba(154,84,53,0.08);
      backdrop-filter: blur(12px);
    }

    .section-title {
      font-size: 11px;
      color: #9A8578;
      letter-spacing: 0.06em;
      padding-bottom: 8px;
      margin: 0;
      border-bottom: 1px solid rgba(220,187,169,0.4);
    }

    .section-title.password {
      border-top: 1px solid rgba(220,187,169,0.4);
      border-bottom: 1px solid rgba(220,187,169,0.4);
      padding: 8px 0;
      margin: 4px 0 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      color: #9A8578;
      letter-spacing: 0.04em;
    }

    .field input {
      padding: 12px 16px;
      border-radius: 12px;
      outline: none;
      border: 1px solid rgba(220,187,169,0.55);
      background: rgba(255,246,239,0.8);
      font-size: 14px;
      color: #5C3020;
      font-family: inherit;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .update-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      color: #FFF6EF;
      font-size: 14px;
      background: linear-gradient(135deg, #AA958A, #9A8578);
      box-shadow: 0 4px 14px rgba(154,84,53,0.2);
    }

    .update-btn.saved {
      background: linear-gradient(135deg, #877368, #9A8578);
    }

    .discard-btn {
      padding: 12px 20px;
      border-radius: 12px;
      background: rgba(220,187,169,0.35);
      color: #6B6464;
      font-size: 14px;
      border: 1px solid rgba(220,187,169,0.5);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="banner">
      <h2>Edit Profile</h2>
      <p>Update your account information below</p>
    </div>

    <div class="content">
      <div class="layout">
        <div class="avatar-section">
          <div class="avatar">
            <span>A</span>
          </div>
          <button class="btn change-photo" type="button">Change Photo</button>
          <div class="role-card">
            <p class="label">Role</p>
            <p class="value">Head Librarian</p>
          </div>
        </div>

        <div class="form-card">
          <p class="section-title">PERSONAL INFORMATION</p>

          <div class="field">
            <label for="name">FULL NAME</label>
            <input id="name" type="text" value="Admin User" />
          </div>

          <div class="field">
            <label for="email">EMAIL ADDRESS</label>
            <input id="email" type="email" value="admin@librarylink.edu.pk" />
          </div>

          <div class="field">
            <label for="phone">PHONE NUMBER</label>
            <input id="phone" type="text" value="+92-321-4567890" />
          </div>

          <div class="field">
            <label for="department">DEPARTMENT</label>
            <input id="department" type="text" value="Library Administration" />
          </div>

          <div class="field">
            <label for="role">ROLE</label>
            <input id="role" type="text" value="Head Librarian" />
          </div>

          <p class="section-title password">CHANGE PASSWORD</p>

          <div class="field">
            <label for="password">NEW PASSWORD</label>
            <input id="password" type="password" placeholder="••••••••" />
          </div>

          <div class="field">
            <label for="confirmPassword">CONFIRM PASSWORD</label>
            <input id="confirmPassword" type="password" placeholder="••••••••" />
          </div>

          <div class="actions">
            <button id="updateBtn" class="btn update-btn" type="button">Update Profile</button>
            <button id="discardBtn" class="btn discard-btn" type="button">Discard</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const defaults = {
      name: "Admin User",
      email: "admin@librarylink.edu.pk",
      phone: "+92-321-4567890",
      department: "Library Administration",
      role: "Head Librarian",
      password: "",
      confirmPassword: ""
    };

    const updateBtn = document.getElementById("updateBtn");
    const discardBtn = document.getElementById("discardBtn");

    updateBtn.addEventListener("click", () => {
      updateBtn.textContent = "✓ Profile Updated!";
      updateBtn.classList.add("saved");

      setTimeout(() => {
        updateBtn.textContent = "Update Profile";
        updateBtn.classList.remove("saved");
      }, 2500);
    });

    discardBtn.addEventListener("click", () => {
      Object.keys(defaults).forEach((key) => {
        const input = document.getElementById(key);
        if (input) input.value = defaults[key];
      });
    });
  </script>
</body>
