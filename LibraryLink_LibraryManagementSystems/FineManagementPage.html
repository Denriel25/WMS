<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fine Management</title>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { useState, useEffect } from "react";
    import * as api from "../../lib/api";

    // Plain JavaScript version of the component (no TypeScript in the HTML module)
    export function FineManagementPage() {
  const [tab,     setTab]     = useState("outstanding");
  const [fines,   setFines]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [paying,  setPaying]  = useState(null);

  const load = () => {
    setLoading(true);
    api.getFines().then(setFines).catch(() => {}).finally(() => setLoading(false));
  };

  useEffect(() => { load(); }, []);

  const outstanding = fines.filter(f => !f.paid);
  const paid        = fines.filter(f => f.paid);
  const totalOwed   = outstanding.reduce((s, f) => s + f.amount, 0);
  const totalPaid   = paid.reduce((s, f) => s + f.amount, 0);

  const handlePay = async (id) => {
    setPaying(id);
    try { await api.payFine(id); load(); } catch {}
    finally { setPaying(null); }
  };

  const card = { background: "linear-gradient(160deg,rgba(255,246,239,0.9),rgba(250,236,226,0.85))", border: "1px solid rgba(220,187,169,0.5)", boxShadow: "0 4px 24px rgba(154,84,53,0.08)" };
  const tabs = [
    { id: "outstanding", label: `Outstanding (${outstanding.length})` },
    { id: "payment",     label: "Payment Records" },
    { id: "history",     label: "Fine History" },
  ];

  return (
    <div className="flex flex-col h-full overflow-hidden" style={{ background: "linear-gradient(160deg,#FFF6EF 0%,#FAE9DD 60%,#EECBAD 100%)", fontFamily: "Poppins, sans-serif" }}>
      <div className="flex shrink-0" style={{ background: "linear-gradient(90deg,rgba(248,234,223,0.97),rgba(220,187,169,0.5))", borderBottom: "1px solid rgba(154,84,53,0.12)" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} className="px-5 py-3.5 relative" style={{ fontSize: "13px", color: tab === t.id ? "#9A5435" : "#BCB1AB", fontWeight: tab === t.id ? 500 : 400, background: "transparent", fontFamily: "Poppins, sans-serif" }}>
            {t.label}
            {tab === t.id && <span className="absolute bottom-0 left-0 right-0 h-0.5 rounded-t-full" style={{ background: "linear-gradient(90deg,#9A5435,#C4784F)" }} />}
          </button>
        ))}
      </div>

      <div className="flex-1 overflow-y-auto p-5 flex flex-col gap-4">
        {/* Summary cards */}
        <div className="grid grid-cols-3 gap-4">
          {[
            { l: "Total Outstanding", v: `PKR ${totalOwed}`,  g: "linear-gradient(135deg,#9A5435,#C4784F)" },
            { l: "Pending Students",  v: String(outstanding.length), g: "linear-gradient(135deg,#D6A17B,#EBC09B)" },
            { l: "Total Collected",   v: `PKR ${totalPaid}`,  g: "linear-gradient(135deg,#6B6464,#9A8578)" },
          ].map(s => (
            <div key={s.l} className="rounded-2xl p-4" style={card}>
              <p style={{ fontFamily: "Hammersmith One, sans-serif", fontSize: "20px", background: s.g, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{s.v}</p>
              <p style={{ fontSize: "11px", color: "#9A8578", marginTop: 2 }}>{s.l}</p>
            </div>
          ))}
        </div>

        {loading ? (
          <div className="flex items-center justify-center py-16" style={{ color: "#BCB1AB", fontSize: "13px" }}>Loading fines from database…</div>
        ) : (
          <>
            {tab === "outstanding" && (
              <div className="rounded-2xl overflow-hidden" style={card}>
                <div className="px-5 py-3" style={{ background: "linear-gradient(90deg,rgba(220,187,169,0.4),rgba(250,236,226,0.2))", borderBottom: "1px solid rgba(220,187,169,0.35)" }}>
                  <p style={{ fontFamily: "Hammersmith One, sans-serif", fontSize: "16px", color: "#5C3020" }}>Outstanding Fines</p>
                </div>
                {outstanding.length === 0 ? (
                  <div className="flex flex-col items-center py-12 gap-2" style={{ color: "#BCB1AB" }}>
                    <span style={{ fontSize: "36px" }}>✅</span>
                    <p style={{ fontSize: "13px" }}>No outstanding fines</p>
                  </div>
                ) : outstanding.map((f, i) => (
                  <div key={f.id} className="flex items-center gap-4 px-5 py-4" style={{ borderBottom: "1px solid rgba(220,187,169,0.2)", background: i % 2 === 0 ? "transparent" : "rgba(250,233,221,0.35)" }}>
                    <div className="flex-1">
                      <p style={{ fontSize: "13px", color: "#5C3020", fontWeight: 600 }}>{f.userName} <span style={{ fontSize: "10px", color: "#BCB1AB", fontWeight: 400 }}>· {f.userId}</span></p>
                      <p style={{ fontSize: "12px", color: "#877368" }}>{f.bookTitle}</p>
                      <p style={{ fontSize: "11px", color: "#BCB1AB", marginTop: 2 }}>{f.daysOverdue} days overdue · {f.createdDate}</p>
                    </div>
                    <div className="text-right flex flex-col items-end gap-2">
                      <p style={{ fontFamily: "Hammersmith One, sans-serif", fontSize: "18px", color: "#9A5435" }}>PKR {f.amount}</p>
                      <button onClick={() => handlePay(f.id)} disabled={paying === f.id} className="px-3 py-1.5 rounded-full hover:opacity-85 transition-opacity" style={{ fontSize: "11px", background: "linear-gradient(135deg,#9A5435,#C4784F)", color: "#FFF6EF", boxShadow: "0 2px 8px rgba(154,84,53,0.2)" }}>
                        {paying === f.id ? "Processing…" : "Collect Fine"}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {tab === "payment" && (
              <div className="rounded-2xl overflow-hidden" style={card}>
                <div className="px-5 py-3" style={{ background: "linear-gradient(90deg,rgba(220,187,169,0.4),rgba(250,236,226,0.2))", borderBottom: "1px solid rgba(220,187,169,0.35)" }}>
                  <p style={{ fontFamily: "Hammersmith One, sans-serif", fontSize: "16px", color: "#5C3020" }}>Payment Records</p>
                </div>
                {paid.length === 0 ? (
                  <div className="py-10 text-center" style={{ fontSize: "13px", color: "#BCB1AB" }}>No payments recorded yet</div>
                ) : (
                  <table className="w-full">
                    <thead>
                      <tr style={{ background: "linear-gradient(90deg,rgba(220,187,169,0.5),rgba(235,192,155,0.3))" }}>
                        {["Student","Book","Amount","Paid On"].map(h => (
                          <th key={h} className="text-left px-4 py-3" style={{ fontSize: "11px", color: "#9A8578", fontWeight: 500, letterSpacing: "0.04em" }}>{h.toUpperCase()}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {paid.map((f, i) => (
                        <tr key={f.id} style={{ background: i % 2 === 0 ? "transparent" : "rgba(250,233,221,0.4)", borderBottom: "1px solid rgba(220,187,169,0.2)" }}>
                          <td className="px-4 py-3" style={{ fontSize: "13px", color: "#5C3020", fontWeight: 500 }}>{f.userName}</td>
                          <td className="px-4 py-3" style={{ fontSize: "12px", color: "#6B6464" }}>{f.bookTitle}</td>
                          <td className="px-4 py-3" style={{ fontFamily: "Hammersmith One, sans-serif", fontSize: "15px", color: "#877368" }}>PKR {f.amount}</td>
                          <td className="px-4 py-3" style={{ fontSize: "12px", color: "#BCB1AB" }}>{f.paidDate ?? "—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            )}

            {tab === "history" && (
              <div className="rounded-2xl overflow-hidden" style={card}>
                <div className="px-5 py-3" style={{ background: "linear-gradient(90deg,rgba(220,187,169,0.4),rgba(250,236,226,0.2))", borderBottom: "1px solid rgba(220,187,169,0.35)" }}>
                  <p style={{ fontFamily: "Hammersmith One, sans-serif", fontSize: "16px", color: "#5C3020" }}>All Fine Transactions</p>
                </div>
                {fines.length === 0 ? (
                  <div className="py-10 text-center" style={{ fontSize: "13px", color: "#BCB1AB" }}>No fines recorded yet</div>
                ) : fines.map((f, i) => (
                  <div key={f.id} className="flex items-center justify-between px-5 py-3" style={{ borderBottom: "1px solid rgba(220,187,169,0.2)", background: i % 2 === 0 ? "transparent" : "rgba(250,233,221,0.3)" }}>
                    <div>
                      <p style={{ fontSize: "13px", color: "#5C3020", fontWeight: 500 }}>{f.userName}</p>
                      <p style={{ fontSize: "11px", color: "#BCB1AB" }}>{f.bookTitle} · {f.daysOverdue}d overdue</p>
                    </div>
                    <div className="flex items-center gap-3">
                      <p style={{ fontSize: "14px", color: "#9A5435", fontWeight: 600 }}>PKR {f.amount}</p>
                      <span className="px-2 py-0.5 rounded-full" style={{ fontSize: "10px", background: f.paid ? "rgba(135,115,104,0.1)" : "rgba(154,84,53,0.12)", color: f.paid ? "#877368" : "#9A5435" }}>{f.paid ? "Paid" : "Pending"}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
    }

    // If you want to mount this component directly in the page for testing
    // uncomment the following (requires React and ReactDOM available):
    // import ReactDOM from 'react-dom';
    // ReactDOM.render(React.createElement(FineManagementPage), document.getElementById('root'));
  </script>
</body>
</html>
