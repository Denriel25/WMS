<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="auth-body">

<div class="auth-container">

    <div class="auth-card">

        <h1>LibraryLink</h1>

        <h3>Login</h3>

        <form>

            <input
                type="email"
                placeholder="Email Address"
            >

            <input
                type="password"
                placeholder="Password"
            >

            <button type="submit">
                Login
            </button>

            <p>
                No account?
                <a href="signup.html">
                    Sign Up
                </a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
